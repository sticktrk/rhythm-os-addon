# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Rhythm Lighting
version: "4.2.024-alpha"
image: dtconcepts/rhythm-lighting-addon
slug: rhythm
description: Connects to Home Assistant WebSocket API and listens for switch events
url: "https://github.com/sticktrk/rhythm-lighting"
arch:
  - armv7
  - aarch64
  - amd64
init: false
auth_api: true
homeassistant_api: true
map:
  - config:rw
ingress: true
ingress_port: 39821
ingress_entry: /
host_network: true
panel_icon: mdi:lightbulb
panel_title: Rhythm Lighting
panel_admin: false
options:
  manage_integration: true
  manage_blueprints: true
schema:
  manage_integration: bool
  manage_blueprints: bool
